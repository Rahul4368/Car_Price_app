<!DOCTYPE html>
<html>
<head>
    <title>Car Price Prediction</title>
</head>
<body>

<h2>🚗 Car Price Prediction</h2>

<form action="/predict" method="post">
    <input type="number" name="year" placeholder="Year" required><br><br>
    <input type="number" name="mileage" placeholder="Mileage" required><br><br>
    <input type="number" name="tax" placeholder="Tax" required><br><br>
    <input type="number" name="mpg" placeholder="MPG" required><br><br>
    <input type="number" step="0.1" name="engineSize" placeholder="Engine Size" required><br><br>

    <button type="submit">Predict</button>
</form>

{% if prediction %}
    <h3>💰 Predicted Price: {{ prediction }}</h3>
{% endif %}

</body>
</html>
